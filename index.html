<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Complaint Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <!-- Theme Toggle -->
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Dark Mode">
        <i class="fa-solid fa-moon"></i>
    </button>

    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-branding">
                <i class="fa-solid fa-headset auth-logo"></i>
                <h2>CMS Portal</h2>
                <p>Welcome back! Let's get things sorted.</p>
            </div>
            <div class="auth-illustration">
                <!-- Add an illustration image if available or just use CSS graphics -->
                <i class="fa-solid fa-chart-line illustration-icon"></i>
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-form-container">
                <h3>Login to your account</h3>
                <p class="auth-sub">Enter your details below to continue.</p>

                <form id="login-form" class="auth-form">
                    <div id="login-error" class="error-message" style="display: none;"></div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-with-icon">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" id="email" placeholder="john.doe@example.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary auth-submit">
                        <i class="fa-solid fa-right-to-bracket"></i> Login
                    </button>
                    
                    <p class="auth-link">Don't have an account? <a href="signup.html">Sign up</a></p>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
